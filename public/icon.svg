<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="#0b0c10"/>
  
  <!-- Outer disc ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#7c6ff7" stroke-width="22"/>
  
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#7c6ff7" stroke-width="10" stroke-opacity="0.5"/>
  
  <!-- Inner dome -->
  <circle cx="256" cy="256" r="58" fill="#7c6ff7"/>
  <circle cx="256" cy="256" r="40" fill="#9186f9"/>
  <circle cx="244" cy="242" r="14" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Flight path arc — RHBH understable then fade -->
  <path d="M 256 430 Q 340 320 310 210 Q 280 130 256 256" 
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="8" stroke-linecap="round"/>
</svg>
